<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal - DKV</title>
    <link rel="icon" type="image/x-icon" href="https://dkv2526.vercel.app/aset/icon.jpg" />
    <link rel="stylesheet" href="https://dkv2526.vercel.app/css/login.css">  
</head>
<body>

    <div class="login-box">
        <h2>Welcome</h2>
        <p>Akses Database Siswa DKV</p>
        
        <div class="input-group">
            <input type="email" id="email" required>
            <label>Email</label>
        </div>
        
        <div class="input-group">
            <input type="password" id="password" required>
            <label>Password</label>
        </div>
        
        <div class="button-group">
            <button id="btnLogin" class="btn-main">Masuk</button>
            <button id="btnRegister" class="btn-sub">Daftar Akun</button>
            <button id="btnGuest" class="btn-sub" style="margin-top: 5px; border-style: dashed;">Masuk sebagai Tamu</button>
        </div>
    </div>

    <script type="module" src="https://dkv2526.vercel.app/js/login.js"></script>
</body>
</html>
